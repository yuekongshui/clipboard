name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild clean build \
            -project clipboard.xcodeproj \
            -scheme clipboard \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project clipboard.xcodeproj \
            -scheme clipboard \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
