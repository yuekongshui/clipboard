name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Package.swift
        run: |
          if [ ! -f Package.swift ]; then
            echo "Package.swift not found."
            echo "This repository is currently an Xcode project, not a Swift Package."
            exit 1
          fi

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
